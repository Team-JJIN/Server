# 로컬 개발 전용 오버라이드 — docker compose가 같은 디렉토리의 이 파일을 자동으로 병합합니다.
# 로컬에서는 앱이 컨테이너 밖(./gradlew bootRun, DB_HOST=localhost)에서 돌기 때문에
# 호스트에서 MySQL 컨테이너로 접근할 3306 포트 바인딩이 필요합니다.
# EC2에는 deploy.yml이 docker-compose.yml만 복사하므로 이 파일이 적용되지 않습니다
# (운영에서는 app이 내부 네트워크로 mysql에 직접 접근하므로 포트 개방 불필요).
services:
  redis:
    ports:
      - "127.0.0.1:6379:6379"
